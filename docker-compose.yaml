services:
  backend:
    image: ghcr.io/<your-github-username>/<your-repo-name>/backend:latest
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: ghcr.io/<your-github-username>/<your-repo-name>/frontend:latest
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
