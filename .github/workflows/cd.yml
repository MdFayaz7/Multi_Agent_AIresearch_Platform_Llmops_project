name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run if the triggering CI workflow finished successfully
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            # Navigate to application directory on the server
            cd /path/to/your/app/nexus-research-platform
            
            # Log in to GHCR on the server using a Personal Access Token (PAT) with package read permissions
            echo "${{ secrets.DEPLOY_GHCR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            
            # Pull the latest Docker images
            docker compose pull
            
            # Restart the services with the new images
            docker compose up -d --remove-orphans
