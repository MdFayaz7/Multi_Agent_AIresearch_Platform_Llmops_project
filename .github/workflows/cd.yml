name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            cd /home/ubuntu/nexus-research-platform

            # Pull latest code (including updated docker-compose.yaml)
            git pull origin main

            # Set the lowercase repo name for image references
            export REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

            # Log in to GHCR
            echo "${{ secrets.DEPLOY_GHCR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Pull the latest Docker images from GHCR
            REPO_LOWER=$REPO_LOWER docker compose pull

            # Restart the services with the new images
            REPO_LOWER=$REPO_LOWER docker compose up -d --remove-orphans
