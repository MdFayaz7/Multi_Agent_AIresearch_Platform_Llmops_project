name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            # ✅ FIX: Navigate to the actual folder where your docker-compose.yml lives.
            # Change "ubuntu" below if you use a different SSH username (like ec2-user or root)
            cd /home/ubuntu/nexus-research-platform
            
            # Log in to GHCR
            echo "${{ secrets.DEPLOY_GHCR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            
            # Pull the latest Docker images
            docker compose pull
            
            # Restart the services with the new images
            docker compose up -d --remove-orphans
